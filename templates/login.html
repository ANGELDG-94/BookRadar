{% extends 'base.html' %}

{% block content %}
<section class="hero-section" style="max-width: 400px; margin: 3rem auto; background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h1 class="hero-title" style="margin-bottom: 0.5rem;">Bienvenido de nuevo</h1>
    <p style="color: #64748B; margin-bottom: 1.5rem;">Inicia sesión para ver tu radar de libros</p>

    <form method="POST" action="/login" style="display: flex; flex-direction: column; gap: 1rem; text-align: left;">

        {% if error %}
        <div style="background-color: #fee2e2; color: #ef4444; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.9rem; text-align: center;">
            {{ error }}
        </div>
        {% endif %}

        <div>
            <label style="font-size: 0.9rem; font-weight: 600; color: #334155;">Correo Electrónico</label>
            <!-- IMPORTANTE: El atributo name="email" conecta con Python -->
            <input type="email" name="email" class="search-input" style="width: 100%; margin-top: 0.25rem;" required>
        </div>
        <div>
            <label style="font-size: 0.9rem; font-weight: 600; color: #334155;">Contraseña</label>
            <!-- IMPORTANTE: El atributo name="password" conecta con Python -->
            <input type="password" name="password" class="search-input" style="width: 100%; margin-top: 0.25rem;" required>
        </div>

        <button type="submit" class="search-btn" style="width: 100%; padding: 0.75rem; margin-top: 1rem;">Acceder</button>
    </form>

    <p style="margin-top: 1.5rem; font-size: 0.9rem; color: #64748B;">
        ¿No tienes cuenta? <a href="/registro" style="color: #3B82F6; text-decoration: none; font-weight: 600;">Regístrate</a>
    </p>
</section>
{% endblock %}
