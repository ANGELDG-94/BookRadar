{% extends 'base.html' %}

{% block content %}
<section class="hero-section" style="max-width: 400px; margin: 3rem auto; background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
    <h1 class="hero-title" style="margin-bottom: 0.5rem;">Crear Cuenta</h1>
    <p style="color: #64748B; margin-bottom: 1.5rem;">Únete a BookRadar y guarda tus lecturas</p>

    <form id="form-registro" style="display: flex; flex-direction: column; gap: 1rem; text-align: left;">
        <div>
            <label style="font-size: 0.9rem; font-weight: 600; color: #334155;">Nombre de usuario</label>
            <input type="text" id="reg-usuario" class="search-input" style="width: 100%; margin-top: 0.25rem;" required>
        </div>
        <div>
            <label style="font-size: 0.9rem; font-weight: 600; color: #334155;">Correo Electrónico</label>
            <input type="email" id="reg-email" class="search-input" style="width: 100%; margin-top: 0.25rem;" required>
        </div>
        <div>
            <label style="font-size: 0.9rem; font-weight: 600; color: #334155;">Contraseña</label>
            <input type="password" id="reg-password" class="search-input" style="width: 100%; margin-top: 0.25rem;" required>
        </div>

        <button type="submit" class="search-btn" style="width: 100%; padding: 0.75rem; margin-top: 1rem;">Registrarse</button>
    </form>

    <p style="margin-top: 1.5rem; font-size: 0.9rem; color: #64748B;">
        ¿Ya tienes cuenta? <a href="/login" style="color: #3B82F6; text-decoration: none; font-weight: 600;">Inicia Sesión</a>
    </p>
</section>

<script>
    document.getElementById('form-registro').addEventListener('submit', async (e) => {
        e.preventDefault();
        const usuario = document.getElementById('reg-usuario').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        const res = await fetch('/api/registro', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuario, email, password })
        });
        const data = await res.json();

        if(data.status === 'success') {
            alert("¡Cuenta creada con éxito! Ahora puedes iniciar sesión.");
            window.location.href = '/login';
        } else {
            alert("Error: " + data.mensaje);
        }
    });
</script>
{% endblock %}
